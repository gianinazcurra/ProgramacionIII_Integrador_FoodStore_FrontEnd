<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/src/admin.css" />
  <title>Gestión de Pedidos</title>
</head>
<body>

<header>
  <h1>Food Store - Administración</h1>

  <nav>
    <a href="../adminHome/index.html">Dashboard</a>
    <a href="../products/index.html">Productos</a>
    <a href="../categories/index.html">Categorías</a>
    <a href="./index.html">Pedidos</a>
    <a href="../../store/home/index.html">Ver Tienda</a>
    <button id="logoutBtn">Cerrar sesión</button>
  </nav>
</header>

<hr>

<h2>Gestión de Pedidos</h2>

<label for="filtroEstado">Filtrar por estado:</label>
<select id="filtroEstado">
  <option value="TODOS">Todos</option>
  <option value="PENDIENTE">Pendiente</option>
  <option value="CONFIRMADO">Confirmado</option>
  <option value="TERMINADO">Terminado</option>
  <option value="CANCELADO">Cancelado</option>
</select>

<br><br>

<section id="pedidosContainer"></section>

<div id="modalPedido" style="display:none; border:1px solid black; padding:15px; margin-top:20px;">
  <h3>Detalle del Pedido</h3>

  <div id="detallePedido"></div>

  <br>

  <label for="estadoPedido">Cambiar estado:</label>
  <select id="estadoPedido">
    <option value="PENDIENTE">Pendiente</option>
    <option value="CONFIRMADO">Confirmado</option>
    <option value="TERMINADO">Terminado</option>
    <option value="CANCELADO">Cancelado</option>
  </select>

  <br><br>

  <button id="guardarEstadoPedido" type="button">Guardar Estado</button>
  <button id="cerrarModalPedido" type="button">Cerrar</button>
</div>

<script type="module" src="./orders.ts"></script>
</body>
</html>
